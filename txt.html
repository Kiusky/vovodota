<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="VOVO DOTA">
    <meta property="og:description" content="Sou o vovodota o vovo mais Viking da Internet">
    <meta property="og:image" content="https://vovodota.com/imagem/ic-vovo.png">
    <meta property="og:url" content="">
    <title>Vovo Dota</title>

    <link rel="icon" type="image/x-icon" href="https://vovodota.com/imagem/ic-vovo.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            user-select: none; /* Evita seleção de texto durante o load */
        }
        
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to right,
                #0a3b0a,
                #0a1f3d,
                #1a1a1a,
                #3d0a0a
            );
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            pointer-events: all; /* Captura todos os cliques */
        }

        /* OVERLAY DE BLOQUEIO FÍSICO */
        #blockOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 999998;
            display: none;
            pointer-events: all; /* BLOQUEIA QUALQUER CLIQUE */
        }

        .loader-icon {
            width: 97px;
            height: 97px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: .7; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: .7; }
        }
        
        /* Garante que nada seja clicável durante o load */
        body.loading {
            pointer-events: none;
        }
        
        body.loading .container {
            pointer-events: none;
        }
        
        /* Quando o load acabar */
        body.loaded {
            pointer-events: auto;
        }
    </style>
</head>
<body class="loading">

<div id="loader">
    <img src="imagem/ic-vovo.png" class="loader-icon" draggable="false">
</div>

<!-- OVERLAY QUE BLOQUEIA FISICAMENTE OS CLIQUES -->
<div id="blockOverlay"></div>

<div id="audioControls">
    <div id="muteBtn"><i class="fas fa-volume-mute" style="color:gray;"></i></div>
    <div id="nextBtn" class="audio-control-btn hidden"><i class="fas fa-forward"></i></div>
</div>

<div class="wrapper">
    <div class="container">

        <img src="imagem/vovodota.gif" class="name-img" draggable="false">
        <img src="imagem/vovo.png" class="fade-img clickable-img" draggable="false">

        <a id="steamLink" class="btn steam" href="https://steamcommunity.com/profiles/76561198268358383/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-steam"></i> Steam
        </a>

        <a id="discordLink" class="btn discord" href="https://discord.gg/puXGnwvEF5" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-discord"></i> Discord
        </a>

        <a class="btn youtube" href="https://www.youtube.com/@vovodota/live" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-youtube"></i> YouTube
        </a>

        <a class="btn tiktok" href="https://www.tiktok.com/@vovodota5" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a class="btn instagram" href="https://www.instagram.com/vovodota/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a class="btn twitch" href="https://www.twitch.tv/vovodota" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-twitch"></i> Twitch
        </a>

        <a class="btn whatsapp" 
           href="https://chat.whatsapp.com/Eq7Jd52R6zYCAg13h5RDUT" 
           target="_blank" 
           rel="noopener noreferrer"
           style="background:#158f43; color:white; transition:0.3s;">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

    </div>
</div>

<script>
// SOLUÇÃO DEFINITIVA - NENHUM CLIQUE SERÁ LEMBRADO

(function() {
    const loader = document.getElementById("loader");
    const blockOverlay = document.getElementById("blockOverlay");
    
    // Mostra o overlay de bloqueio imediatamente
    blockOverlay.style.display = "block";
    
    // Função para remover completamente todos os bloqueios
    function removeAllBlocks() {
        // Esconde o overlay
        if (blockOverlay) {
            blockOverlay.style.display = "none";
        }
        
        // Remove a classe de loading do body
        document.body.classList.remove("loading");
        document.body.classList.add("loaded");
        
        // Libera os ponteiros do body
        document.body.style.pointerEvents = "auto";
        
        // Remove qualquer evento remanescente (opcional)
        setTimeout(() => {
            // Força o navegador a limpar a fila de eventos
            window.getComputedStyle(document.body);
        }, 10);
    }
    
    // Aguarda o carregamento completo da página
    window.addEventListener("load", function () {
        // Aguarda mais 100ms para garantir que tudo está pronto
        setTimeout(function() {
            // Animação de fade out do loader
            loader.style.opacity = "0";
            loader.style.transition = "opacity 0.3s";
            
            // Após a animação, remove o loader e os bloqueios
            setTimeout(function() {
                loader.style.display = "none";
                removeAllBlocks();
            }, 300);
        }, 100);
    });
    
    // Garantia extra: se algo demorar mais que 3 segundos, força remoção
    setTimeout(function() {
        if (loader.style.display !== "none") {
            loader.style.display = "none";
            removeAllBlocks();
        }
    }, 3000);
})();

// BLOQUEIO EXTRA: Previne qualquer clique durante o load
document.addEventListener('click', function(e) {
    const loader = document.getElementById("loader");
    const overlay = document.getElementById("blockOverlay");
    
    // Se o overlay estiver visível, bloqueia TUDO
    if (overlay && overlay.style.display === "block") {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        return false;
    }
}, true); // true = fase de captura, antes de qualquer outro evento

// Bloqueia também eventos de teclado durante o load
document.addEventListener('keydown', function(e) {
    const overlay = document.getElementById("blockOverlay");
    if (overlay && overlay.style.display === "block") {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        return false;
    }
}, true);

// Bloqueia scroll durante o load
document.addEventListener('wheel', function(e) {
    const overlay = document.getElementById("blockOverlay");
    if (overlay && overlay.style.display === "block") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
}, { passive: false, capture: true });
</script>

<script src="script.js"></script>
</body>
</html>
