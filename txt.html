<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="VOVO DOTA">
    <meta property="og:description" content="Sou o vovodota o vovo mais Viking da Internet">
    <meta property="og:image" content="https://vovodota.com/imagem/ic-vovo.png">
    <meta property="og:url" content="">
    <title>Vovo Dota</title>

    <link rel="icon" type="image/x-icon" href="https://vovodota.com/imagem/ic-vovo.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            user-select: none;
        }
        
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #0a3b0a, #0a1f3d, #1a1a1a, #3d0a0a);
            box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            pointer-events: all;
        }

        #blockOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 999998;
            display: none;
            pointer-events: all;
        }

        .loader-icon {
            width: 97px;
            height: 97px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: .7; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: .7; }
        }
        
        body.loading {
            pointer-events: none;
        }
        
        body.loading .container {
            pointer-events: none;
        }
        
        body.loaded {
            pointer-events: auto;
        }
    </style>
</head>
<body class="loading">

<div id="loader">
    <img src="imagem/ic-vovo.png" class="loader-icon" draggable="false">
</div>

<div id="blockOverlay"></div>

<div id="audioControls">
    <div id="muteBtn"><i class="fas fa-volume-mute" style="color:gray;"></i></div>
    <div id="nextBtn" class="audio-control-btn hidden"><i class="fas fa-forward"></i></div>
</div>

<div class="wrapper">
    <div class="container">

        <img src="imagem/vovodota.gif" class="name-img" draggable="false">
        
        <div style="text-align: center;">
            <img src="imagem/vovo-N0.png" class="fade-img clickable-img" draggable="false">
            
            <div style="background: rgba(0, 0, 0, 0.2);"></div>
            
            <div style="display: inline-block; background: rgba(0, 0, 0, 0.7); padding: 8px 12px; border-radius: 10px; margin-top: -10px;">
                <p id="alarmText" style="color: #ff4444; font-family: 'Arial', sans-serif; font-size: 20px; margin: 0; font-weight: bold; animation: alarmPulse 1s infinite;">
                    <span>Faltam</span>
                    <span id="countdown" style="margin-left: 8px;">calculando...</span>
                </p>
            </div>
        </div>

        <style>
            @keyframes alarmPulse {
                0% { text-shadow: 0 0 5px black, 0 0 0px #ff0000; opacity: 1; color: #ff4444; }
                50% { text-shadow: 0 0 10px black, 0 0 15px #ff0000, 0 0 5px #ff6600; opacity: 0.85; color: #ff8888; }
                100% { text-shadow: 0 0 5px black, 0 0 0px #ff0000; opacity: 1; color: #ff4444; }
            }
        </style>

        <a id="steamLink" class="btn steam" href="https://steamcommunity.com/profiles/76561198268358383/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-steam"></i> Steam
        </a>

        <a id="discordLink" class="btn discord" href="https://discord.gg/puXGnwvEF5" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-discord"></i> Discord
        </a>

        <a class="btn youtube" href="https://www.youtube.com/@vovodota/live" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-youtube"></i> YouTube
        </a>

        <a class="btn tiktok" href="https://www.tiktok.com/@vovodota5" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a class="btn instagram" href="https://www.instagram.com/vovodota/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a class="btn twitch" href="https://www.twitch.tv/vovodota" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-twitch"></i> Twitch
        </a>

        <a class="btn whatsapp" 
           href="https://chat.whatsapp.com/Eq7Jd52R6zYCAg13h5RDUT" 
           target="_blank" 
           rel="noopener noreferrer"
           style="background:#158f43; color:white; transition:0.3s;">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

    </div>
</div>

<script>
// Countdown do aniversário
const ANIVERSARIO_MES = 6;
const ANIVERSARIO_DIA = 16;

function isAniversarioHoje(data) {
    return data.getMonth() + 1 === ANIVERSARIO_MES && data.getDate() === ANIVERSARIO_DIA;
}

function updateCountdown() {
    const hoje = new Date();
    const anoAtual = hoje.getFullYear();
    let dataAniversario = new Date(anoAtual, ANIVERSARIO_MES - 1, ANIVERSARIO_DIA);
    
    if (hoje > dataAniversario && !isAniversarioHoje(hoje)) {
        dataAniversario = new Date(anoAtual + 1, ANIVERSARIO_MES - 1, ANIVERSARIO_DIA);
    }
    
    const diff = dataAniversario - hoje;
    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff % 86400000) / 3600000);
    const minutos = Math.floor((diff % 3600000) / 60000);
    const segundos = Math.floor((diff % 60000) / 1000);
    
    const countdownElement = document.getElementById('countdown');
    const alarmTextElement = document.getElementById('alarmText');
    const spanElement = alarmTextElement.querySelector('span:first-child');
    
    if (isAniversarioHoje(hoje)) {
        spanElement.innerHTML = '🎉';
        countdownElement.innerHTML = 'Hoje é o dia do VOVO! 🎂';
        alarmTextElement.style.animation = "alarmPulse 0.3s infinite";
    } else if (dias === 0 && horas === 0 && minutos === 0 && segundos < 30) {
        spanElement.innerHTML = '🎉';
        countdownElement.innerHTML = 'Hoje é o dia do VOVO! 🎂';
        alarmTextElement.style.animation = "alarmPulse 0.3s infinite";
    } else if (dias === 0) {
        spanElement.innerHTML = 'Faltam';
        countdownElement.innerHTML = `${horas}h ${minutos}m ${segundos}s`;
    } else {
        spanElement.innerHTML = 'Faltam';
        countdownElement.innerHTML = `${dias} dias, ${horas}h ${minutos}m ${segundos}s`;
    }
}

updateCountdown();
setInterval(updateCountdown, 1000);

// Funções do loader com blockOverlay e prevenção de eventos
(function() {
    const loader = document.getElementById("loader");
    const blockOverlay = document.getElementById("blockOverlay");
    
    blockOverlay.style.display = "block";
    
    function removeAllBlocks() {
        if (blockOverlay) {
            blockOverlay.style.display = "none";
        }
        
        document.body.classList.remove("loading");
        document.body.classList.add("loaded");
        
        document.body.style.pointerEvents = "auto";
        
        setTimeout(() => {
            window.getComputedStyle(document.body);
        }, 10);
    }
    
    window.addEventListener("load", function () {
        setTimeout(function() {
            loader.style.opacity = "0";
            loader.style.transition = "opacity 0.3s";
            
            setTimeout(function() {
                loader.style.display = "none";
                removeAllBlocks();
            }, 300);
        }, 100);
    });
    
    setTimeout(function() {
        if (loader.style.display !== "none") {
            loader.style.display = "none";
            removeAllBlocks();
        }
    }, 3000);
})();

// Prevenção de eventos durante o loading
document.addEventListener('click', function(e) {
    const overlay = document.getElementById("blockOverlay");
    
    if (overlay && overlay.style.display === "block") {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        return false;
    }
}, true);

document.addEventListener('keydown', function(e) {
    const overlay = document.getElementById("blockOverlay");
    if (overlay && overlay.style.display === "block") {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        return false;
    }
}, true);

document.addEventListener('wheel', function(e) {
    const overlay = document.getElementById("blockOverlay");
    if (overlay && overlay.style.display === "block") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
}, { passive: false, capture: true });
</script>

<script src="script.js"></script>
</body>
</html>
