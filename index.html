<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="VOVO DOTA">
    <meta property="og:description" content="Sou o vovodota o vovo mais Viking da Internet">
    <meta property="og:image" content="https://vovodota.com/imagem/ic-vovo.png">
    <meta property="og:url" content="">
    <title>Vovo Dota</title>

    <link rel="icon" type="image/x-icon" href="https://vovodota.com/imagem/ic-vovo.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body.loading {
            overflow: hidden;
            pointer-events: none;
            cursor: wait;
        }
        
        body.loaded {
            overflow: auto;
            pointer-events: auto;
            cursor: default;
        }
        
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #0a3b0a, #0a1f3d, #1a1a1a, #3d0a0a);
            box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: opacity 0.5s ease;
        }

        #loader.hide {
            opacity: 0;
            pointer-events: none;
        }

        .wrapper {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .wrapper.loaded {
            opacity: 1;
            visibility: visible;
        }

        .loader-icon {
            width: 97px;
            height: 97px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: .7; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: .7; }
        }
        
        .countdown-container {
            display: inline-block;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 10px;
            margin-top: -10px;
        }

        .countdown-container.hidden {
            display: none;
        }

        @keyframes alarmPulse {
            0% { text-shadow: 0 0 5px black, 0 0 0px #ff0000; opacity: 1; color: #ff4444; }
            50% { text-shadow: 0 0 10px black, 0 0 15px #ff0000, 0 0 5px #ff6600; opacity: 0.85; color: #ff8888; }
            100% { text-shadow: 0 0 5px black, 0 0 0px #ff0000; opacity: 1; color: #ff4444; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 30px;
            margin: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .btn {
                min-width: 150px;
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body class="loading">

<div id="loader">
    <img src="imagem/ic-vovo.png" class="loader-icon" draggable="false">
</div>

<div id="audioControls">
    <div id="muteBtn"><i class="fas fa-volume-mute" style="color:gray;"></i></div>
    <div id="nextBtn" class="audio-control-btn hidden"><i class="fas fa-forward"></i></div>
</div>

<div class="wrapper">
    <div class="container">

        <img src="imagem/vovodota.gif" class="name-img" draggable="false">
        
        <div style="text-align: center;">
            <img src="imagem/vovo.png" class="fade-img clickable-img" draggable="false">
            
            <div class="countdown-container" id="countdownContainer">
                <p id="alarmText" style="color: #ff4444; font-family: 'Arial', sans-serif; font-size: 20px; margin: 0; font-weight: bold; animation: alarmPulse 1s infinite;">
                    <span id="countdownPrefix">Faltam</span>
                    <span id="countdown" style="margin-left: 8px;">calculando...</span>
                </p>
            </div>
        </div>

        <a id="steamLink" class="btn steam" href="https://steamcommunity.com/profiles/76561198268358383/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-steam"></i> Steam
        </a>

        <a id="discordLink" class="btn discord" href="https://discord.gg/puXGnwvEF5" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-discord"></i> Discord
        </a>

        <a class="btn youtube" href="https://www.youtube.com/@vovodota/live" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-youtube"></i> YouTube
        </a>

        <a class="btn tiktok" href="https://www.tiktok.com/@vovodota5" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a class="btn instagram" href="https://www.instagram.com/vovodota/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a class="btn twitch" href="https://www.twitch.tv/vovodota" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-twitch"></i> Twitch
        </a>

        <a class="btn whatsapp" 
           href="https://chat.whatsapp.com/Eq7Jd52R6zYCAg13h5RDUT" 
           target="_blank" 
           rel="noopener noreferrer"
           style="background:#158f43; color:white; transition:0.3s;">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

    </div>
</div>

<script>
(function() {
    const loader = document.getElementById('loader');
    const wrapper = document.querySelector('.wrapper');
    const body = document.body;
    
    let totalAssets = 0;
    let loadedAssets = 0;
    
    const imagens = [
        'imagem/ic-vovo.png',
        'imagem/vovodota.gif',
        'imagem/vovo.png',
        'imagem/fundo.jpg',
        'imagem/mouse.cur'
    ];
    
    const audios = [
        'audio/intro.mp3',
        'audio/musica1.mp3',
        'audio/musica2.mp3',
        'audio/musica3.mp3',
        'audio/tic.mp3',
        'audio/clic.mp3',
        'audio/machado.mp3',
        'audio/voz.mp3',
        'audio/pedra.mp3'
    ];
    
    totalAssets = imagens.length + audios.length;
    
    function assetLoaded() {
        loadedAssets++;
        if (loadedAssets >= totalAssets) {
            loader.classList.add('hide');
            setTimeout(() => {
                loader.style.display = 'none';
                wrapper.classList.add('loaded');
                body.classList.remove('loading');
                body.classList.add('loaded');
            }, 500);
        }
    }
    
    imagens.forEach(src => {
        const img = new Image();
        img.onload = assetLoaded;
        img.onerror = assetLoaded;
        img.src = src;
    });
    
    audios.forEach(src => {
        const audio = new Audio();
        audio.preload = 'auto';
        audio.oncanplaythrough = assetLoaded;
        audio.onerror = assetLoaded;
        audio.src = src;
        audio.load();
    });
    
    setTimeout(() => {
        if (loadedAssets < totalAssets) {
            loadedAssets = totalAssets;
            assetLoaded();
        }
    }, 8000);
})();
</script>

<script src="script.js"></script>
</body>
</html>
