    <style>
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to right,
                #0a3b0a,
                #0a1f3d,
                #1a1a1a,
                #3d0a0a
            );
            box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
        }

        .loader-icon {
            width: 97px;
            height: 97px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: .7; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: .7; }
        }
    </style>
</head>
<body>

<div id="loader">
    <img src="imagem/ic-vovo.png" class="loader-icon" draggable="false">
</div>

<div id="audioControls">
    <div id="muteBtn"><i class="fas fa-volume-mute" style="color:gray;"></i></div>
    <div id="nextBtn" class="audio-control-btn hidden"><i class="fas fa-forward"></i></div>
</div>

<div class="wrapper">
    <div class="container">

        <img src="imagem/vovodota.gif" class="name-img" draggable="false">
<div style="text-align: center;">
    <img src="imagem/vovo-N0.png" class="fade-img clickable-img" draggable="false">
    
    <div style="display: inline-block; background: rgba(0, 0, 0, 0.7); padding: 8px 12px; border-radius: 10px; margin-top: -10px;">
        <p id="alarmText" style="color: #ff4444; font-family: 'Arial', sans-serif; font-size: 20px; margin: 0; font-weight: bold; animation: alarmPulse 1s infinite;">
            <span>Faltam</span>
            <span id="countdown" style="margin-left: 8px;">calculando...</span>
        </p>
    </div>
</div>

<style>
    @keyframes alarmPulse {
        0% { text-shadow: 0 0 5px black, 0 0 0px #ff0000; opacity: 1; color: #ff4444; }
        50% { text-shadow: 0 0 10px black, 0 0 15px #ff0000, 0 0 5px #ff6600; opacity: 0.85; color: #ff8888; }
        100% { text-shadow: 0 0 5px black, 0 0 0px #ff0000; opacity: 1; color: #ff4444; }
    }
</style>

<script>
    const ANIVERSARIO_MES = 5;
    const ANIVERSARIO_DIA = 16;
    
    function updateCountdown() {
        const hoje = new Date();
        const anoAtual = hoje.getFullYear();
        let dataAniversario = new Date(anoAtual, ANIVERSARIO_MES, ANIVERSARIO_DIA);
        
        if (hoje > dataAniversario) dataAniversario = new Date(anoAtual + 1, ANIVERSARIO_MES, ANIVERSARIO_DIA);
        
        const diff = dataAniversario - hoje;
        const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
        const horas = Math.floor((diff % 86400000) / 3600000);
        const minutos = Math.floor((diff % 3600000) / 60000);
        const segundos = Math.floor((diff % 60000) / 1000);
        
        const countdownElement = document.getElementById('countdown');
        const alarmTextElement = document.getElementById('alarmText');
        
        if (dias === 0 && horas === 0 && minutos === 0 && segundos < 30) {
            countdownElement.innerHTML = `HOJE É O DIA! 🎉`;
            alarmTextElement.style.animation = "alarmPulse 0.3s infinite";
        } else if (dias === 0) {
            countdownElement.innerHTML = `${horas}h ${minutos}m ${segundos}s`;
        } else {
            countdownElement.innerHTML = `${dias} dias, ${horas}h ${minutos}m ${segundos}s`;
        }
    }
    
    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>
